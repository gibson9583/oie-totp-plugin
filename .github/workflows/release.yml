# Builds the plugin against a downloaded OIE distribution on a semver tag, publishes
# a GitHub Release with the zip, then opens a community-catalog PR so the Community
# Store offers it.
#
#   git tag v0.3.1 && git push origin v0.3.1
#
# The tag drives the version stamped into the pom (zip name), plugin.xml
# (pluginVersion — what the engine reports as "installed"); oie.json is verified to
# match the tag. Requires a CATALOG_TOKEN repo secret (fine-grained PAT with
# Contents + Pull requests read/write on the catalog repo).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  OIE_TAG: v4.6.0-rc1
  OIE_TARBALL: oie_unix_4_6_0-rc1.tar.gz

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
      minengine: ${{ steps.pkg.outputs.minengine }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve and verify version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(jq -r .version oie.json)"; MANIFEST_VERSION="${MANIFEST_VERSION#v}"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version $VERSION but oie.json says $MANIFEST_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache OIE distribution
        id: oie-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OIE_TARBALL }}
          key: oie-dist-${{ env.OIE_TAG }}

      - name: Download OIE distribution (engine jars)
        if: steps.oie-cache.outputs.cache-hit != 'true'
        run: curl -fSL -o "$OIE_TARBALL" "https://github.com/OpenIntegrationEngine/engine/releases/download/${OIE_TAG}/${OIE_TARBALL}"

      - name: Extract engine jars and set OIE_HOME
        run: |
          tar xzf "$OIE_TARBALL"
          test -f "$GITHUB_WORKSPACE/oie/server-lib/mirth-server.jar"
          test -f "$GITHUB_WORKSPACE/oie/server-lib/mybatis-3.1.1.jar"
          echo "OIE_HOME=$GITHUB_WORKSPACE/oie" >> "$GITHUB_ENV"

      - name: Stamp version (pom + plugin.xml + webadmin)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mvn -B -ntp versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          sed -i "s|<pluginVersion>[^<]*</pluginVersion>|<pluginVersion>${VERSION}</pluginVersion>|" plugin.xml
          jq --arg v "$VERSION" '.version = $v' webadmin/plugin.json > webadmin/plugin.json.tmp && mv webadmin/plugin.json.tmp webadmin/plugin.json

      - name: Build extension
        run: mvn -B -ntp -DskipTests package

      - name: Stage the release asset and checksum
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="$(find target -maxdepth 1 -name 'totpmfa-*.zip' | head -n1)"
          if [ -z "$SRC" ]; then
            echo "::error::No totpmfa zip found in target/"; ls -l target || true; exit 1
          fi
          ASSET="totpmfa-${VERSION}.zip"
          mkdir -p out
          cp "$SRC" "out/${ASSET}"
          ( cd out && sha256sum "${ASSET}" > "${ASSET}.sha256" )
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d' ' -f1 "out/${ASSET}.sha256")" >> "$GITHUB_OUTPUT"
          echo "minengine=$(jq -r '.minEngineVersion // "4.6.0"' oie.json)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ steps.pkg.outputs.asset }}
            out/${{ steps.pkg.outputs.asset }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Opens a PR against the community catalog with this release's manifest — catalog
  # CI digest-verifies before merge, and the index rebuild on merge makes connected
  # engines offer the update on their next sync.
  catalog-manifest:
    needs: release
    runs-on: ubuntu-latest
    env:
      CATALOG_REPO: gibson9583/oie-community-catalog
      PLUGIN_ID: totpmfa
      VERSION: ${{ needs.release.outputs.version }}
      SHA256: ${{ needs.release.outputs.sha256 }}
      MIN_ENGINE: ${{ needs.release.outputs.minengine }}
      GH_TOKEN: ${{ secrets.CATALOG_TOKEN }}
    steps:
      - name: Require the catalog token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CATALOG_TOKEN secret is not set — cannot open the catalog PR. Add a fine-grained PAT with Contents+Pull requests access to $CATALOG_REPO."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: gibson9583/oie-community-catalog
          token: ${{ secrets.CATALOG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write the package meta.json (from the plugin's oie.json)
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/v${VERSION}/oie.json" -o /tmp/oie.json
          node -e '
            const o = JSON.parse(require("fs").readFileSync("/tmp/oie.json","utf8"));
            const meta = {
              id: o.id, name: o.name, description: o.description, type: o.type,
              publisher: (o.authors && o.authors[0]) || o.id,
              repository: o.homepage, homepage: o.homepage, documentation: o.documentation,
              license: o.license, authors: o.authors || [], keywords: o.keywords || [],
              deprecated: !!o.deprecated
            };
            require("fs").writeFileSync(process.env.META_PATH, JSON.stringify(meta, null, 4) + "\n");
          '
        env:
          META_PATH: manifests/plugins/${{ env.PLUGIN_ID }}/meta.json

      - name: Write the version manifest
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          cat > "manifests/plugins/${PLUGIN_ID}/${VERSION}.json" <<EOF
          {
              "version": "${VERSION}",
              "minEngineVersion": "${MIN_ENGINE}",
              "maxEngineVersion": null,
              "installerUrl": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${PLUGIN_ID}-${VERSION}.zip",
              "sha256": "${SHA256}",
              "restartRequired": true,
              "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "releaseNotesUrl": "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
              "docsUrl": "https://raw.githubusercontent.com/${{ github.repository }}/v${VERSION}/docs/store.md"
          }
          EOF
          # Surface the plugin's UI surfaces (from the tagged oie.json) when declared.
          UI="$(jq -c '.ui // empty' /tmp/oie.json)"
          if [ -n "$UI" ]; then
            jq --indent 4 --argjson ui "$UI" '. + {ui: $ui}' \
              "manifests/plugins/${PLUGIN_ID}/${VERSION}.json" > /tmp/version.json.tmp
            mv /tmp/version.json.tmp "manifests/plugins/${PLUGIN_ID}/${VERSION}.json"
          fi

      - name: Validate (schema + digest download)
        run: node scripts/build-index.mjs --lint --verify "manifests/plugins/${PLUGIN_ID}/${VERSION}.json"

      - name: Open the catalog PR
        run: |
          BRANCH="${PLUGIN_ID}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifests
          git commit -m "${PLUGIN_ID} ${VERSION}"
          git push -f origin "$BRANCH"
          if gh pr list -R "$CATALOG_REPO" --head "$BRANCH" --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for $BRANCH — branch updated."
          else
            gh pr create -R "$CATALOG_REPO" --head "$BRANCH" \
              --title "${PLUGIN_ID} ${VERSION}" \
              --body "Automated manifest for [${PLUGIN_ID} v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}). Digest verified against the release asset by catalog CI."
          fi
